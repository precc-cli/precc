[skill]
name = "gradle-wrong-dir"
description = "Fix gradle/gradlew commands run outside a Gradle project"
source = "builtin"
priority = 50

[[triggers]]
type = "command_regex"
pattern = "^(gradle|gradlew|\\./gradlew)\\s+"
weight = 1.0

[[triggers]]
type = "file_exists"
pattern = "!build.gradle"
weight = 0.7

[[actions]]
type = "prepend_cd"
template = "cd {{project_root}} && {{original_command}}"
confidence = 0.9

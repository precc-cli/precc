[skill]
name = "terraform-wrong-dir"
description = "Fix terraform/tofu commands run outside a Terraform project"
source = "builtin"
priority = 50

[[triggers]]
type = "command_regex"
pattern = "^(terraform|tofu)\\s+(init|plan|apply|destroy|validate|fmt|state|output)"
weight = 1.0

[[triggers]]
type = "file_exists"
pattern = "!main.tf"
weight = 0.6

[[actions]]
type = "prepend_cd"
template = "cd {{project_root}} && {{original_command}}"
confidence = 0.85

[skill]
name = "bazel-wrong-dir"
description = "Fix bazel commands run outside a Bazel workspace"
source = "builtin"
priority = 50

[[triggers]]
type = "command_regex"
pattern = "^(bazel|bazelisk)\\s+"
weight = 1.0

[[triggers]]
type = "file_exists"
pattern = "!WORKSPACE"
weight = 0.7

[[actions]]
type = "prepend_cd"
template = "cd {{project_root}} && {{original_command}}"
confidence = 0.85

[skill]
name = "maven-wrong-dir"
description = "Fix mvn commands run outside a Maven project"
source = "builtin"
priority = 50

[[triggers]]
type = "command_regex"
pattern = "^mvn\\s+"
weight = 1.0

[[triggers]]
type = "file_exists"
pattern = "!pom.xml"
weight = 0.8

[[actions]]
type = "prepend_cd"
template = "cd {{project_root}} && {{original_command}}"
confidence = 0.9

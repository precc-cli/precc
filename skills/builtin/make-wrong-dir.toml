[skill]
name = "make-wrong-dir"
description = "Fix make commands run outside a project with a Makefile"
source = "builtin"
priority = 50

[[triggers]]
type = "command_regex"
pattern = "^make(\\s+|$)"
weight = 1.0

[[triggers]]
type = "file_exists"
pattern = "!Makefile"
weight = 0.8

[[actions]]
type = "prepend_cd"
template = "cd {{project_root}} && {{original_command}}"
confidence = 0.9
